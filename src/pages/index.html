

<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yuai15 - TextGenerator</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* ─────────────────────────────────────────
           MD3 Dark · Violet Tonal Palette
        ───────────────────────────────────────── */
        :root {
            --md-bg:                    #111318;
            --md-surface-low:           #191c24;
            --md-surface:               #1d2029;
            --md-surface-high:          #272a35;
            --md-surface-highest:       #32353f;

            --md-primary:               #cbb8ff;
            --md-on-primary:            #2d0076;
            --md-primary-container:     #4a1fa8;
            --md-on-primary-container:  #ecdeff;

            --md-secondary-container:   #3b3550;
            --md-on-secondary-container:#e4ddf5;

            --md-outline:               #7a7585;
            --md-outline-variant:       #2a2733;

            --md-on-surface:            #e4e1ec;
            --md-on-surface-variant:    #c9c4d0;

            --md-error:                 #ffb4ab;

            --md-shape-full:   9999px;
            --md-shape-large:  16px;
            --md-shape-medium: 12px;
            --md-shape-small:  8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist Sans', sans-serif;
            background: var(--md-bg);
            color: var(--md-on-surface);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--md-outline-variant); border-radius: var(--md-shape-full); }

        /* ─────────────────────────────────────────
           TOP APP BAR
        ───────────────────────────────────────── */
        nav {
            height: 56px;
            padding: 0 1rem;
            background: var(--md-surface-low);
            border-bottom: 1px solid var(--md-outline-variant);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            z-index: 10;
        }

        .nav-icon {
            width: 36px; height: 36px;
            border-radius: var(--md-shape-medium);
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.82rem;
            flex-shrink: 0;
        }

        .nav-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--md-on-surface);
            letter-spacing: -0.01em;
        }

        .nav-chip {
            margin-left: auto;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: var(--md-shape-full);
            background: var(--md-secondary-container);
            color: var(--md-on-secondary-container);
            letter-spacing: 0.03em;
            display: flex; align-items: center; gap: 6px;
        }

        .nav-chip i { font-size: 0.45rem; color: var(--md-primary); }

        /* ─────────────────────────────────────────
           CHAT AREA
        ───────────────────────────────────────── */
        #chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* ─────────────────────────────────────────
           USER MESSAGE — right pill bubble
        ───────────────────────────────────────── */
        .bubble-wrapper.user-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding: 8px 20px 4px;
            animation: msgIn 0.2s ease both;
        }

        .user-bubble {
            max-width: min(70%, 520px);
            padding: 10px 18px;
            border-radius: var(--md-shape-full);
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
            font-size: 0.9rem;
            line-height: 1.55;
        }

        /* ─────────────────────────────────────────
           AI MESSAGE — full-width stripe
        ───────────────────────────────────────── */
        .bubble-wrapper.ai-wrapper {
            display: flex;
            flex-direction: column;
            background: var(--md-surface-low);
            border-top: 1px solid var(--md-outline-variant);
            border-bottom: 1px solid var(--md-outline-variant);
            animation: msgIn 0.2s ease both;
        }

        .ai-inner {
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
            padding: 14px 20px 10px;
        }

        .ai-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--md-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ai-bubble {
            font-size: 0.9rem;
            line-height: 1.65;
            color: var(--md-on-surface);
        }

        .ai-bubble canvas {
            max-width: 100%;
            border-radius: var(--md-shape-medium);
            display: block;
        }

        /* ─────────────────────────────────────────
           META ROW
        ───────────────────────────────────────── */
        .bubble-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .user-wrapper .bubble-meta { justify-content: flex-end; padding-right: 2px; }
        .ai-wrapper   .bubble-meta { justify-content: flex-start; }

        .meta-time {
            font-size: 0.67rem;
            color: var(--md-outline);
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            font-weight: 500;
            font-family: inherit;
            padding: 4px 12px;
            border-radius: var(--md-shape-full);
            border: none;
            cursor: pointer;
            background: var(--md-secondary-container);
            color: var(--md-on-secondary-container);
            transition: filter 0.15s;
        }

        .download-btn:hover  { filter: brightness(1.12); }
        .download-btn:active { filter: brightness(0.92); }

        /* ─────────────────────────────────────────
           LOADING DOTS
        ───────────────────────────────────────── */
        .loading-dots {
            display: flex;
            gap: 6px;
            padding: 4px 0;
            align-items: center;
        }

        .loading-dots span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--md-primary);
            opacity: 0.25;
            animation: dotPulse 1.3s infinite ease-in-out;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.18s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.36s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.2; transform: scale(0.85); }
            50%       { opacity: 1;   transform: scale(1.1); }
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─────────────────────────────────────────
           EMPTY STATE
        ───────────────────────────────────────── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            pointer-events: none;
            user-select: none;
            padding: 2rem;
        }

        .empty-icon {
            width: 56px; height: 56px;
            border-radius: var(--md-shape-large);
            background: var(--md-surface-high);
            border: 1px solid var(--md-outline-variant);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.35rem;
            color: var(--md-primary);
        }

        .empty-state p {
            font-size: 0.85rem;
            text-align: center;
            color: var(--md-on-surface-variant);
            max-width: 240px;
            line-height: 1.55;
        }

        /* ─────────────────────────────────────────
           BOTTOM INPUT BAR
        ───────────────────────────────────────── */
        .chat-navbar {
            flex-shrink: 0;
            padding: 10px 16px 12px;
            background: var(--md-surface-low);
            border-top: 1px solid var(--md-outline-variant);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .color-picker-wrapper {
            position: relative;
            width: 40px; height: 40px;
            border-radius: var(--md-shape-medium);
            overflow: hidden;
            border: 2px solid var(--md-outline-variant);
            cursor: pointer;
            flex-shrink: 0;
            transition: border-color 0.2s;
        }

        .color-picker-wrapper:hover { border-color: var(--md-primary); }

        input[type="color"] {
            position: absolute;
            inset: -4px;
            width: calc(100% + 8px);
            height: calc(100% + 8px);
            border: none;
            padding: 0;
            cursor: pointer;
        }

        .input-group {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--md-surface-highest);
            border-radius: var(--md-shape-full);
            padding: 0 16px;
            border: 1px solid transparent;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--md-primary);
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--md-primary) 18%, transparent);
        }

        .input-icon {
            color: var(--md-outline);
            font-size: 0.76rem;
            flex-shrink: 0;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--md-on-surface);
            font-size: 0.9rem;
            font-family: inherit;
            padding: 11px 0;
            caret-color: var(--md-primary);
        }

        input[type="text"]::placeholder { color: var(--md-outline); }

        .send-btn {
            width: 44px; height: 44px;
            border-radius: var(--md-shape-medium);
            border: none;
            background: var(--md-primary);
            color: var(--md-on-primary);
            font-size: 0.85rem;
            cursor: pointer;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: filter 0.15s, transform 0.1s;
        }

        .send-btn:hover  { filter: brightness(1.1); }
        .send-btn:active { transform: scale(0.95); filter: brightness(0.92); }

        /* ─────────────────────────────────────────
           RENDER SANDBOX
        ───────────────────────────────────────── */
        .render-temp {
            position: absolute;
            left: -9999px;
            top: 0;
        }
    </style>
</head>
<body>

    <!-- Top App Bar -->
    <nav>
        <div class="nav-icon"><i class="fas fa-wand-magic-sparkles"></i></div>
        <span class="nav-title">Yuai15</span>
        <div class="nav-chip">
            <i class="fas fa-circle"></i>
            TextGenerator
        </div>
    </nav>

    <!-- Chat List -->
    <div id="chat-list">
        <div class="empty-state" id="empty-state">
            <div class="empty-icon"><i class="fas fa-sparkles"></i></div>
            <p>Ketik prompt untuk mulai generate text visual</p>
        </div>
    </div>

    <!-- Render Sandbox -->
    <div id="render-sandbox" class="render-temp"></div>

    <!-- Bottom Input Bar -->
    <div class="chat-navbar">
        <div class="color-picker-wrapper" title="Pilih warna">
            <input type="color" id="colorPicker" value="#8b5cf6">
        </div>
        <div class="input-group">
            <i class="fas fa-pen-nib input-icon"></i>
            <input type="text" id="promptInput" placeholder="Ketik prompt di sini..." />
        </div>
        <button class="send-btn" id="sendBtn" title="Kirim">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script is:inline>
        const chatList = document.getElementById('chat-list');
        const promptInput = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');
        const colorPicker = document.getElementById('colorPicker');
        const sandbox = document.getElementById('render-sandbox');
        const emptyState = document.getElementById('empty-state');

        // Color Picker Logic
        colorPicker.addEventListener('change', (e) => {
            promptInput.value += ` ${e.target.value}`;
            promptInput.focus();
        });

        function getTime() {
            return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        }

        async function handleSend() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Remove empty state
            if (emptyState) emptyState.remove();

            // 1. User Bubble
            addBubble(prompt, 'user');
            promptInput.value = '';

            // 2. AI Loading Bubble
            const loadingId = 'ai-' + Date.now();
            addBubble(null, 'ai', loadingId, true);

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const htmlContent = await response.text();
                
                // 3. Render ke Canvas
                await renderToCanvas(htmlContent, loadingId);

            } catch (err) {
                document.getElementById(loadingId).querySelector('.ai-bubble').innerHTML = 
                    `<i class="fas fa-circle-exclamation" style="color:var(--md-error);margin-right:6px;"></i>Error: ${err.message}`;
            }
        }

        function addBubble(content, sender, id = null, loading = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `bubble-wrapper ${sender}-wrapper`;
            if (id) wrapper.id = id;

            if (sender === 'user') {
                // ── User: rounded pill, right-aligned ──
                const bubble = document.createElement('div');
                bubble.className = 'user-bubble';
                bubble.textContent = content;
                wrapper.appendChild(bubble);

                const meta = document.createElement('div');
                meta.className = 'bubble-meta';
                const timeSpan = document.createElement('span');
                timeSpan.className = 'meta-time';
                timeSpan.textContent = getTime();
                meta.appendChild(timeSpan);
                wrapper.appendChild(meta);

            } else {
                // ── AI: full-width stripe ──
                const inner = document.createElement('div');
                inner.className = 'ai-inner';

                const label = document.createElement('div');
                label.className = 'ai-label';
                label.innerHTML = '<i class="fas fa-robot"></i> Yuai15';
                inner.appendChild(label);

                const bubble = document.createElement('div');
                bubble.className = 'ai-bubble';
                if (loading) {
                    bubble.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;
                }
                inner.appendChild(bubble);

                const meta = document.createElement('div');
                meta.className = 'bubble-meta';
                const timeSpan = document.createElement('span');
                timeSpan.className = 'meta-time';
                timeSpan.textContent = getTime();
                meta.appendChild(timeSpan);
                inner.appendChild(meta);

                wrapper.appendChild(inner);
            }

            chatList.appendChild(wrapper);
            chatList.scrollTop = chatList.scrollHeight;
        }

        async function renderToCanvas(html, targetId) {
            // Masukkan ke sandbox tersembunyi
            sandbox.innerHTML = html;
            
            // Tunggu sebentar biar font/style terload (optional tapi disarankan)
            await new Promise(r => setTimeout(r, 500));

            const targetElement = sandbox.querySelector('.text') || sandbox;

            try {
                const canvas = await html2canvas(targetElement, {
                    backgroundColor: null,
                    logging: false,
                    useCORS: true
                });

                const wrapperEl = document.getElementById(targetId);
                const aiBubble = wrapperEl.querySelector('.ai-bubble');
                aiBubble.innerHTML = ''; // Hapus loading
                aiBubble.appendChild(canvas);

                // Add download button to meta row
                const meta = wrapperEl.querySelector('.bubble-meta');
                const dlBtn = document.createElement('button');
                dlBtn.className = 'download-btn';
                dlBtn.innerHTML = '<i class="fas fa-download"></i> Unduh';
                dlBtn.addEventListener('click', () => {
                    const link = document.createElement('a');
                    link.download = `yuai15-${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
                meta.appendChild(dlBtn);

                // Bersihkan sandbox
                sandbox.innerHTML = '';
                chatList.scrollTop = chatList.scrollHeight;
            } catch (e) {
                console.error(e);
                document.getElementById(targetId).querySelector('.ai-bubble').innerHTML =
                    '<i class="fas fa-triangle-exclamation" style="color:var(--md-error);margin-right:6px;"></i>Gagal render canvas.';
            }
        }

        sendBtn.addEventListener('click', handleSend);
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
