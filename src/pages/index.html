

<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yuai15 - TextGenerator</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* ─────────────────────────────────────────
           COSMIC NIGHT · Premium Dark Theme
        ───────────────────────────────────────── */
        :root {
            --cosmic-bg:                #0a0e27;
            --cosmic-surface-low:       #141829;
            --cosmic-surface:           #1a1f3a;
            --cosmic-surface-high:      #252d4d;
            --cosmic-surface-highest:   #2d3557;

            --cosmic-primary:           #00d9ff;
            --cosmic-primary-dark:      #0099cc;
            --cosmic-accent:            #ff006e;
            --cosmic-accent-alt:        #8b5cf6;
            --cosmic-glow:              #00d9ff;

            --cosmic-on-primary:        #000a14;
            --cosmic-on-surface:        #f0f2f8;
            --cosmic-on-surface-variant:#b8bcc8;

            --cosmic-outline:           #616978;
            --cosmic-outline-variant:   #1f2535;

            --cosmic-success:           #00ff88;
            --cosmic-warning:           #ffa500;
            --cosmic-error:             #ff1744;

            --cosmic-shape-full:   9999px;
            --cosmic-shape-large:  20px;
            --cosmic-shape-medium: 12px;
            --cosmic-shape-small:  6px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--cosmic-bg) 0%, #0f1433 50%, var(--cosmic-bg) 100%));
            color: var(--cosmic-on-surface);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 217, 255, 0.3);
            border-radius: var(--cosmic-shape-full);
            transition: background 0.2s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 217, 255, 0.6);
        }

        /* ─────────────────────────────────────────
           TOP APP BAR
        ───────────────────────────────────────── */
        nav {
            height: 60px;
            padding: 0 1.5rem;
            background: rgba(var(--cosmic-surface-low), 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(var(--cosmic-outline-variant), 0.3);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            z-index: 100;
            position: relative;
        }

        nav::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.5), transparent);
            pointer-events: none;
        }

        .nav-icon {
            width: 40px; height: 40px;
            border-radius: var(--cosmic-shape-medium);
            background: linear-gradient(135deg, var(--cosmic-primary) 0%, var(--cosmic-accent-alt) 100%));
            color: var(--cosmic-on-primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .nav-icon:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.5);
        }

        .nav-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--cosmic-on-surface);
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, var(--cosmic-on-surface), var(--cosmic-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-chip {
            margin-left: auto;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: var(--cosmic-shape-full);
            background: rgba(var(--cosmic-primary), 0.15);
            color: var(--cosmic-primary);
            letter-spacing: 0.05em;
            display: flex; align-items: center; gap: 6px;
            border: 1px solid rgba(var(--cosmic-primary), 0.3);
            text-transform: uppercase;
        }

        .nav-chip i { 
            font-size: 0.5rem; 
            color: var(--cosmic-success);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ─────────────────────────────────────────
           CHAT AREA
        ───────────────────────────────────────── */
        #chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* ─────────────────────────────────────────
           USER MESSAGE — right pill bubble
        ───────────────────────────────────────── */
        .bubble-wrapper.user-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding: 10px 20px 6px;
            animation: slideInRight 0.3s ease-out both;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .user-bubble {
            max-width: min(70%, 520px);
            padding: 12px 18px;
            border-radius: var(--cosmic-shape-full);
            background: linear-gradient(135deg, var(--cosmic-primary) 0%, var(--cosmic-accent-alt) 100%));
            color: var(--cosmic-on-primary);
            font-size: 0.92rem;
            line-height: 1.55;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.25);
            backdrop-filter: blur(10px);
        }

        /* ─────────────────────────────────────────
           AI MESSAGE — full-width stripe
        ───────────────────────────────────────── */
        .bubble-wrapper.ai-wrapper {
            display: flex;
            flex-direction: column;
            background: rgba(var(--cosmic-surface-low), 0.5);
            border-top: 1px solid rgba(var(--cosmic-outline-variant), 0.3);
            border-bottom: 1px solid rgba(var(--cosmic-outline-variant), 0.3);
            animation: slideInLeft 0.3s ease-out both;
            position: relative;
            overflow: hidden;
        }

        .bubble-wrapper.ai-wrapper::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--cosmic-accent), transparent);
            opacity: 0.7;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .ai-inner {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 16px 24px 12px;
        }

        .ai-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--cosmic-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-label i {
            font-size: 0.65rem;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .ai-bubble {
            font-size: 0.93rem;
            line-height: 1.7;
            color: var(--cosmic-on-surface);
        }

        .ai-bubble canvas {
            max-width: 100%;
            border-radius: var(--cosmic-shape-medium);
            display: block;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.2);
            border: 1px solid rgba(var(--cosmic-primary), 0.2);
        }

        /* ─────────────────────────────────────────
           META ROW
        ───────────────────────────────────────── */
        .bubble-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .user-wrapper .bubble-meta { justify-content: flex-end; padding-right: 2px; }
        .ai-wrapper   .bubble-meta { justify-content: flex-start; padding-left: 3px; }

        .meta-time {
            font-size: 0.68rem;
            color: var(--cosmic-on-surface-variant);
            font-weight: 500;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.74rem;
            font-weight: 600;
            font-family: inherit;
            padding: 6px 14px;
            border-radius: var(--cosmic-shape-full);
            border: 1px solid rgba(var(--cosmic-success), 0.4);
            cursor: pointer;
            background: rgba(var(--cosmic-success), 0.12);
            color: var(--cosmic-success);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .download-btn:hover {
            background: rgba(var(--cosmic-success), 0.25);
            border-color: rgba(var(--cosmic-success), 0.8);
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.3);
            transform: translateY(-2px);
        }

        .download-btn:active {
            transform: translateY(0);
            box-shadow: 0 0 6px rgba(0, 255, 136, 0.2);
        }

        /* ─────────────────────────────────────────
           LOADING DOTS
        ───────────────────────────────────────── */
        .loading-dots {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            align-items: center;
        }

        .loading-dots span {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--cosmic-primary);
            opacity: 0.3;
            animation: quantumPulse 1.5s infinite ease-in-out;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes quantumPulse {
            0%, 100% { 
                opacity: 0.2; 
                transform: scale(0.8);
                box-shadow: 0 0 6px rgba(0, 217, 255, 0.2);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
                box-shadow: 0 0 16px rgba(0, 217, 255, 0.8);
            }
        }

        /* ─────────────────────────────────────────
           EMPTY STATE
        ───────────────────────────────────────── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            pointer-events: none;
            user-select: none;
            padding: 2rem;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-icon {
            width: 72px; height: 72px;
            border-radius: var(--cosmic-shape-large);
            background: rgba(0, 217, 255, 0.08);
            border: 2px solid rgba(0, 217, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            color: var(--cosmic-primary);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .empty-state p {
            font-size: 0.95rem;
            text-align: center;
            color: var(--cosmic-on-surface-variant);
            max-width: 280px;
            line-height: 1.7;
            font-weight: 500;
        }

        /* ─────────────────────────────────────────
           BOTTOM INPUT BAR
        ───────────────────────────────────────── */
        .chat-navbar {
            flex-shrink: 0;
            padding: 14px 18px 16px;
            background: rgba(var(--cosmic-surface-low), 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(var(--cosmic-outline-variant), 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 50;
        }

        .color-picker-wrapper {
            position: relative;
            width: 44px; height: 44px;
            border-radius: var(--cosmic-shape-medium);
            overflow: hidden;
            border: 2px solid rgba(var(--cosmic-primary), 0.4);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            background: rgba(var(--cosmic-primary), 0.08);
        }

        .color-picker-wrapper:hover {
            border-color: var(--cosmic-primary);
            box-shadow: 0 0 16px rgba(0, 217, 255, 0.3);
        }

        input[type="color"] {
            position: absolute;
            inset: -4px;
            width: calc(100% + 8px);
            height: calc(100% + 8px);
            border: none;
            padding: 0;
            cursor: pointer;
        }

        .input-group {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(var(--cosmic-surface-highest), 0.8);
            border-radius: var(--cosmic-shape-full);
            padding: 0 18px;
            border: 2px solid rgba(var(--cosmic-outline-variant), 0.4);
            transition: all 0.2s;
        }

        .input-group:focus-within {
            border-color: rgba(var(--cosmic-primary), 0.7);
            background: rgba(var(--cosmic-surface-highest), 1);
            box-shadow: 0 0 24px rgba(0, 217, 255, 0.2), inset 0 0 0 1px rgba(0, 217, 255, 0.1);
        }

        .input-icon {
            color: var(--cosmic-primary);
            font-size: 0.8rem;
            flex-shrink: 0;
            animation: wobble 2s ease-in-out infinite;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--cosmic-on-surface);
            font-size: 0.95rem;
            font-family: inherit;
            padding: 12px 0;
            caret-color: var(--cosmic-primary);
        }

        input[type="text"]::placeholder {
            color: var(--cosmic-on-surface-variant);
            opacity: 0.6;
        }

        .send-btn {
            width: 48px; height: 48px;
            border-radius: var(--cosmic-shape-medium);
            border: none;
            background: linear-gradient(135deg, var(--cosmic-primary) 0%, var(--cosmic-accent-alt) 100%));
            color: var(--cosmic-on-primary);
            font-size: 0.9rem;
            cursor: pointer;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(0, 217, 255, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 217, 255, 0.4);
        }

        .send-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 12px rgba(0, 217, 255, 0.3);
        }

        /* ─────────────────────────────────────────
           RENDER SANDBOX
        ───────────────────────────────────────── */
        .render-temp {
            position: absolute;
            left: -9999px;
            top: 0;
        }
    </style>
</head>
<body>

    <!-- Top App Bar -->
    <nav>
        <div class="nav-icon"><i class="fas fa-wand-magic-sparkles"></i></div>
        <span class="nav-title">Yuai15</span>
        <div class="nav-chip">
            <i class="fas fa-circle"></i>
            TextGenerator
        </div>
    </nav>

    <!-- Chat List -->
    <div id="chat-list">
        <div class="empty-state" id="empty-state">
            <div class="empty-icon"><i class="fas fa-sparkles"></i></div>
            <p>Ketik prompt untuk mulai generate text visual</p>
        </div>
    </div>

    <!-- Render Sandbox -->
    <div id="render-sandbox" class="render-temp"></div>

    <!-- Bottom Input Bar -->
    <div class="chat-navbar">
        <div class="color-picker-wrapper" title="Pilih warna">
            <input type="color" id="colorPicker" value="#8b5cf6">
        </div>
        <div class="input-group">
            <i class="fas fa-pen-nib input-icon"></i>
            <input type="text" id="promptInput" placeholder="Ketik prompt di sini..." />
        </div>
        <button class="send-btn" id="sendBtn" title="Kirim">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script is:inline>
        const chatList = document.getElementById('chat-list');
        const promptInput = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');
        const colorPicker = document.getElementById('colorPicker');
        const sandbox = document.getElementById('render-sandbox');
        const emptyState = document.getElementById('empty-state');

        // Color Picker Logic
        colorPicker.addEventListener('change', (e) => {
            promptInput.value += ` ${e.target.value}`;
            promptInput.focus();
        });

        function getTime() {
            return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        }

        async function handleSend() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Remove empty state
            if (emptyState) emptyState.remove();

            // 1. User Bubble
            addBubble(prompt, 'user');
            promptInput.value = '';

            // 2. AI Loading Bubble
            const loadingId = 'ai-' + Date.now();
            addBubble(null, 'ai', loadingId, true);

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const htmlContent = await response.text();
                
                // 3. Render ke Canvas
                await renderToCanvas(htmlContent, loadingId);

            } catch (err) {
                document.getElementById(loadingId).querySelector('.ai-bubble').innerHTML = 
                    `<i class="fas fa-circle-exclamation" style="color:var(--md-error);margin-right:6px;"></i>Error: ${err.message}`;
            }
        }

        function addBubble(content, sender, id = null, loading = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `bubble-wrapper ${sender}-wrapper`;
            if (id) wrapper.id = id;

            if (sender === 'user') {
                // ── User: rounded pill, right-aligned ──
                const bubble = document.createElement('div');
                bubble.className = 'user-bubble';
                bubble.textContent = content;
                wrapper.appendChild(bubble);

                const meta = document.createElement('div');
                meta.className = 'bubble-meta';
                const timeSpan = document.createElement('span');
                timeSpan.className = 'meta-time';
                timeSpan.textContent = getTime();
                meta.appendChild(timeSpan);
                wrapper.appendChild(meta);

            } else {
                // ── AI: full-width stripe ──
                const inner = document.createElement('div');
                inner.className = 'ai-inner';

                const label = document.createElement('div');
                label.className = 'ai-label';
                label.innerHTML = '<i class="fas fa-robot"></i> Yuai15';
                inner.appendChild(label);

                const bubble = document.createElement('div');
                bubble.className = 'ai-bubble';
                if (loading) {
                    bubble.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;
                }
                inner.appendChild(bubble);

                const meta = document.createElement('div');
                meta.className = 'bubble-meta';
                const timeSpan = document.createElement('span');
                timeSpan.className = 'meta-time';
                timeSpan.textContent = getTime();
                meta.appendChild(timeSpan);
                inner.appendChild(meta);

                wrapper.appendChild(inner);
            }

            chatList.appendChild(wrapper);
            chatList.scrollTop = chatList.scrollHeight;
        }

        async function renderToCanvas(html, targetId) {
            // Masukkan ke sandbox tersembunyi
            sandbox.innerHTML = html;
            
            // Tunggu sebentar biar font/style terload (optional tapi disarankan)
            await new Promise(r => setTimeout(r, 500));

            const targetElement = sandbox.querySelector('.text') || sandbox;

            try {
                const canvas = await html2canvas(targetElement, {
                    backgroundColor: null,
                    logging: false,
                    useCORS: true
                });

                const wrapperEl = document.getElementById(targetId);
                const aiBubble = wrapperEl.querySelector('.ai-bubble');
                aiBubble.innerHTML = ''; // Hapus loading
                aiBubble.appendChild(canvas);

                // Add download button to meta row
                const meta = wrapperEl.querySelector('.bubble-meta');
                const dlBtn = document.createElement('button');
                dlBtn.className = 'download-btn';
                dlBtn.innerHTML = '<i class="fas fa-download"></i> Unduh';
                dlBtn.addEventListener('click', () => {
                    const link = document.createElement('a');
                    link.download = `yuai15-${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
                meta.appendChild(dlBtn);

                // Bersihkan sandbox
                sandbox.innerHTML = '';
                chatList.scrollTop = chatList.scrollHeight;
            } catch (e) {
                console.error(e);
                document.getElementById(targetId).querySelector('.ai-bubble').innerHTML =
                    '<i class="fas fa-triangle-exclamation" style="color:var(--md-error);margin-right:6px;"></i>Gagal render canvas.';
            }
        }

        sendBtn.addEventListener('click', handleSend);
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
